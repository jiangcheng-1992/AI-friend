services:
  - type: web
    name: ai-friend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: API_PORT
        value: 10000
      - key: ARK_BASE_URL
        value: https://api.minimaxi.com/v1
      - key: MINIMAX_IMAGE_API_URL
        value: https://api.minimaxi.com/v1/image_generation
      - key: ARK_API_KEY
        sync: false
      - key: ARK_MODEL
        sync: false
      - key: ARK_IMAGE_API_KEY
        sync: false
      - key: ARK_IMAGE_MODEL
        sync: false
